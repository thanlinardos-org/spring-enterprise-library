spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true
    properties:
      hibernate.hibernate.format_sql: true
  level:
    root: INFO
    com:
      thanlinardos: TRACE
    org:
      springframework.security: TRACE
      springframework.web: TRACE
      hibernate:
        SQL: TRACE
        orm.jdbc.bind: TRACE
eureka:
  client:
    # Reduce how long the client waits before sending its first heartbeat/registration (default: 40s)
    initial-instance-info-replication-interval-seconds: 10
    # How often to fetch registry from Eureka server (default: 30s)
    registry-fetch-interval-seconds: 10
  instance:
    # How often to send heartbeat (default: 30s)
    lease-renewal-interval-in-seconds: 10
    # How long before Eureka expires the instance if no heartbeat (default: 90s)
    lease-expiration-duration-in-seconds: 60
server:
  servlet:
    session:
      timeout: 20m
logging.level.org.springframework.security: TRACE,
logging.level.org.springframework.web: TRACE