server {
    listen 443 ssl;
    http2 on;
    server_name angularui.local;

    root /usr/share/nginx/html;
    index index.html;

    # SSL certificates
    ssl_certificate /etc/nginx/ssl/local_angular_ui_client.crt;
    ssl_certificate_key /etc/nginx/ssl/local_angular_ui_client.key;

    # SSL security settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Angular routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static asset caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000";
    }

    # Resource server proxying (mTLS: present client cert to backend)
    location /api/ {
            proxy_pass https://resourceserver.local:8080/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # mTLS: client certificate for the resource server
            proxy_ssl_certificate /etc/nginx/ssl/local_angular_ui_client.crt;
            proxy_ssl_certificate_key /etc/nginx/ssl/local_angular_ui_client.key;
            proxy_ssl_trusted_certificate /etc/nginx/ssl/intermediate.crt;
            proxy_ssl_verify off;

            # Prevent 504 gateway timeout
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
    }
}
