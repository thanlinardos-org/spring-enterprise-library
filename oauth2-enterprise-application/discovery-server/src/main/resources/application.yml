spring:
  application.name: discovery-server
  profiles:
    active: prod
  main:
    lazy-initialization: true
    banner-mode: off
  jmx:
    enabled: false
  config:
    import: optional:configserver:${CONFIG_SERVER_URI}
  jpa:
    open-in-view: false # Enable for leaving JPA connection open while view rendering with thymeleaf
  autoconfigure:
    exclude:
          - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
          - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

server:
  port: ${SERVER_PORT}

eureka:
  instance:
    hostname: ${HOSTNAME}
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
  server:
    # Don't wait 5s for peer sync on startup — we're running standalone
    wait-time-in-ms-when-sync-empty: 0
  environment: prod